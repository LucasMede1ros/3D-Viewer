<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Visualizador 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js" fetchpriority="high"></script>

<style>
*{
    box-sizing:border-box;
}

html,
body{
    margin:0;
    padding:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#191919;
    font-family:Poppins,Arial,sans-serif;
}

model-viewer{
    display:block;
    width:100vw;
    height:100dvh;
    background:#191919;
    --poster-color:#191919;
}

#posterLayer{
    position:fixed;
    inset:0;
    z-index:999997;
    display:flex;
    align-items:center;
    justify-content:center;
    background:#191919;
    padding:40px;
}

#posterLayer img{
    max-width:80vw;
    max-height:70vh;
    width:auto;
    height:auto;
    object-fit:contain;
    display:block;
}

#fechar{
    position:fixed;
    top:calc(20px + env(safe-area-inset-top, 0px));
    right:calc(20px + env(safe-area-inset-right, 0px));
    z-index:999999;
    background:#D43043;
    color:#fff;
    border:none;
    border-radius:6px;
    padding:10px 18px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:.25s;
}

#fechar:hover{
    background:#AA091C;
}

#erro{
    display:none;
    position:fixed;
    inset:0;
    z-index:999998;
    justify-content:center;
    align-items:center;
    color:#fff;
    background:#191919;
    font-size:18px;
    text-align:center;
    padding:30px;
}

@media(max-width:600px){
    #posterLayer{
        padding:24px;
    }

    #posterLayer img{
        max-width:88vw;
        max-height:55vh;
    }

    #fechar{
        top:calc(12px + env(safe-area-inset-top, 0px));
        right:calc(12px + env(safe-area-inset-right, 0px));
        padding:8px 14px;
        font-size:13px;
    }
}
</style>
</head>

<body>

<button id="fechar">Fechar</button>

<div id="posterLayer">
    <img
        id="posterImg"
        src="https://drivers.pichau.com.br/pichaugaming/Banner/Design-Lab-White.png"
        alt="Pichau Design Lab">
</div>

<div id="erro">
    Modelo 3D não encontrado.
</div>

<model-viewer
    id="viewer"
    alt="Visualização 3D do produto"
    camera-controls
    auto-rotate
    rotation-per-second="15deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1"
    interaction-prompt="none"
    loading="eager"
    reveal="auto">
</model-viewer>

<script>
const params = new URLSearchParams(window.location.search);

const model = params.get("model");
const poster = params.get("poster");
const alt = params.get("alt");

const viewer = document.getElementById("viewer");
const erro = document.getElementById("erro");
const fechar = document.getElementById("fechar");
const posterLayer = document.getElementById("posterLayer");
const posterImg = document.getElementById("posterImg");

const parentOrigin = "https://pichaugaming.com.br";
const fallbackUrl = "https://pichaugaming.com.br";

function mostrarErro(){
    viewer.style.display = "none";
    posterLayer.style.display = "none";
    erro.style.display = "flex";
}

function esconderPoster(){
    posterLayer.style.display = "none";
}

function modeloValido(nome){
    if(!nome) return false;
    if(!nome.toLowerCase().endsWith(".glb")) return false;
    if(nome.includes("..")) return false;
    if(nome.includes("/")) return false;
    if(nome.includes("\\")) return false;

    return true;
}

function avisarParent(action){
    if(window.parent !== window){
        window.parent.postMessage({
            type:"viewer3d",
            action:action
        }, parentOrigin);
    }
}

avisarParent("open");

if(poster){
    posterImg.src = poster;
}

if(alt){
    viewer.setAttribute("alt", alt);
    posterImg.setAttribute("alt", alt);
}

if(!modeloValido(model)){
    mostrarErro();
}else{
    const glbUrl = "./" + model;

    const preload = document.createElement("link");
    preload.rel = "preload";
    preload.as = "fetch";
    preload.type = "model/gltf-binary";
    preload.crossOrigin = "anonymous";
    preload.href = glbUrl;
    preload.setAttribute("fetchpriority", "high");
    document.head.appendChild(preload);

    viewer.src = glbUrl;
}

viewer.addEventListener("load", () => {
    esconderPoster();
});

viewer.addEventListener("error", () => {
    mostrarErro();
});

fechar.addEventListener("click", () => {
    if(window.parent !== window){
        avisarParent("close");
    }else{
        if(history.length > 1){
            history.back();
        }else{
            window.location.href = fallbackUrl;
        }
    }
});
</script>

</body>
</html>
