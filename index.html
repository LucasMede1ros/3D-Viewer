<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Visualizador 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>
html,
body{
    margin:0;
    width:100%;
    min-height:100dvh;
    overflow:hidden;
    background:#191919;
    font-family:Poppins,Arial,sans-serif;
}

model-viewer{
    width:100vw;
    height:100dvh;
    background:#191919;
    --poster-color:#191919;
}

#fechar{
    position:fixed;
    top:20px;
    right:20px;
    z-index:999999;
    background:#D43043;
    color:#fff;
    border:none;
    border-radius:6px;
    padding:10px 18px;
    cursor:pointer;
    font-size:14px;
    font-weight:600;
    transition:.25s;
}

#fechar:hover{
    background:#AA091C;
}

#erro,
#loading{
    display:none;
    position:fixed;
    inset:0;
    z-index:999998;
    justify-content:center;
    align-items:center;
    color:#fff;
    background:#191919;
    font-size:18px;
    text-align:center;
    padding:30px;
}

#loading{
    display:flex;
}
</style>
</head>

<body>

<button id="fechar">Fechar</button>

<div id="loading">
    Carregando modelo 3D...
</div>

<div id="erro">
    Modelo 3D não encontrado.
</div>

<model-viewer
    id="viewer"
    poster="https://drivers.pichau.com.br/pichaugaming/Banner/Design-Lab-White.png"
    alt="Visualização 3D do produto"
    camera-controls
    auto-rotate
    rotation-per-second="15deg"
    shadow-intensity="1"
    environment-image="neutral"
    exposure="1"
    interaction-prompt="none"
    loading="eager"
    reveal="auto">
</model-viewer>

<script>
const params = new URLSearchParams(window.location.search);
const model = params.get("model");
const poster = params.get("poster");
const alt = params.get("alt");

const viewer = document.getElementById("viewer");
const erro = document.getElementById("erro");
const loading = document.getElementById("loading");
const fechar = document.getElementById("fechar");

const allowedOrigin = "https://pichaugaming.com.br";

function mostrarErro(){
    viewer.style.display = "none";
    loading.style.display = "none";
    erro.style.display = "flex";
}

function esconderLoading(){
    loading.style.display = "none";
}

function modeloValido(nome){
    if(!nome) return false;
    if(!nome.toLowerCase().endsWith(".glb")) return false;
    if(nome.includes("..")) return false;
    if(nome.includes("/")) return false;
    if(nome.includes("\\")) return false;

    return true;
}

if(window.parent !== window){
    window.parent.postMessage({
        type: "viewer3d",
        action: "open"
    }, allowedOrigin);
}

if(!modeloValido(model)){
    mostrarErro();
}else{
    viewer.src = "./" + model;

    if(poster){
        viewer.setAttribute("poster", poster);
    }

    if(alt){
        viewer.setAttribute("alt", alt);
    }
}

viewer.addEventListener("load", () => {
    esconderLoading();

    if(viewer.dismissPoster){
        viewer.dismissPoster();
    }
});

viewer.addEventListener("error", () => {
    mostrarErro();
});

fechar.addEventListener("click", () => {
    if(window.parent !== window){
        window.parent.postMessage({
            type: "viewer3d",
            action: "close"
        }, allowedOrigin);
    }else{
        history.back();
    }
});
</script>

</body>
</html>
