<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1, viewport-fit=cover">

    <title>Visualizador 3D</title>

    <meta name="robots" content="noindex, nofollow">
    <link rel="icon" href="data:,">
    <link rel="preconnect" href="https://unpkg.com" crossorigin>

    <script
        type="module"
        src="https://unpkg.com/@google/model-viewer@4.1.0/dist/model-viewer.min.js">
    </script>

    <style>
        * {
            box-sizing: border-box;
        }

        html,
        body {
            width: 100%;
            height: 100%;
            min-height: 100%;
            margin: 0;
            padding: 0;
            overflow: hidden;
            background: #191919;
            font-family: Poppins, Arial, sans-serif;
            -webkit-text-size-adjust: 100%;
        }

        body {
            width: 100%;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            overscroll-behavior: none;
        }

        model-viewer {
            position: fixed;
            inset: 0;
            z-index: 1;
            display: block;
            width: 100%;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            min-height: 100vh;
            background: #191919;
            border: 0;
            outline: 0;

            --poster-color: #191919;
            --progress-bar-color: #d43043;
            --progress-bar-height: 3px;
        }

        #posterLayer {
            position: fixed;
            inset: 0;
            z-index: 10;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            padding: 40px;
            background: #191919;
            pointer-events: none;
            opacity: 1;
            visibility: visible;
            transition:
                opacity 0.3s ease,
                visibility 0.3s ease;
        }

        #posterLayer.oculto {
            opacity: 0;
            visibility: hidden;
        }

        #posterImg {
            display: block;
            width: auto;
            height: auto;
            max-width: 80vw;
            max-height: 70vh;
            max-height: 70svh;
            object-fit: contain;
            user-select: none;
            -webkit-user-drag: none;
            margin-bottom: 28px;
        }

        #progressWrap {
            width: min(320px, 70vw);
            height: 6px;
            background: rgba(255, 255, 255, 0.15);
            border-radius: 999px;
            overflow: hidden;
        }

        #progressBar {
            height: 100%;
            width: 0%;
            background: #d43043;
            border-radius: 999px;
            transition: width 0.15s ease-out;
        }

        #progressTexto {
            margin-top: 10px;
            font-size: 13px;
            color: #cccccc;
            letter-spacing: 0.5px;
        }

        #erro {
            position: fixed;
            inset: 0;
            z-index: 20;
            display: none;
            align-items: center;
            justify-content: center;
            width: 100%;
            height: 100vh;
            height: 100svh;
            height: 100dvh;
            padding: 30px;
            background: #191919;
            color: #ffffff;
            font-size: 18px;
            line-height: 1.5;
            text-align: center;
        }

        #erro.visivel {
            display: flex;
        }

        #fechar {
            position: fixed;
            top: calc(20px + env(safe-area-inset-top, 0px));
            right: calc(20px + env(safe-area-inset-right, 0px));
            z-index: 30;
            padding: 10px 18px;
            border: 0;
            border-radius: 6px;
            background: #d43043;
            color: #ffffff;
            font-family: inherit;
            font-size: 14px;
            font-weight: 600;
            line-height: 1.2;
            cursor: pointer;
            appearance: none;
            -webkit-appearance: none;
            touch-action: manipulation;
            transition:
                background-color 0.25s ease,
                transform 0.15s ease;
        }

        #fechar:hover {
            background: #aa091c;
        }

        #fechar:active {
            transform: scale(0.97);
        }

        #fechar:focus-visible {
            outline: 2px solid #ffffff;
            outline-offset: 3px;
        }

        @media (max-width: 600px) {
            #posterLayer {
                padding:
                    calc(24px + env(safe-area-inset-top, 0px))
                    calc(24px + env(safe-area-inset-right, 0px))
                    calc(24px + env(safe-area-inset-bottom, 0px))
                    calc(24px + env(safe-area-inset-left, 0px));
            }

            #posterImg {
                max-width: 88vw;
                max-height: 55vh;
                max-height: 55svh;
            }

            #fechar {
                top: calc(12px + env(safe-area-inset-top, 0px));
                right: calc(12px + env(safe-area-inset-right, 0px));
                padding: 9px 14px;
                font-size: 13px;
            }

            #erro {
                padding:
                    calc(24px + env(safe-area-inset-top, 0px))
                    calc(24px + env(safe-area-inset-right, 0px))
                    calc(24px + env(safe-area-inset-bottom, 0px))
                    calc(24px + env(safe-area-inset-left, 0px));
                font-size: 16px;
            }
        }
    </style>
</head>

<body>

    <button
        id="fechar"
        type="button"
        aria-label="Fechar visualizador 3D">
        Fechar
    </button>

    <div id="posterLayer" aria-hidden="true">
        <img
            id="posterImg"
            src="https://drivers.pichau.com.br/pichaugaming/Banner/Design-Lab-White.png"
            alt="Pichau Design Lab"
            draggable="false">
        <div
            id="progressWrap"
            role="progressbar"
            aria-label="Carregando modelo 3D"
            aria-valuemin="0"
            aria-valuemax="100"
            aria-valuenow="0">
            <div id="progressBar"></div>
        </div>
        <div id="progressTexto">Carregando modelo 3D... 0%</div>
    </div>

    <div
        id="erro"
        role="alert"
        aria-live="assertive">
        Não foi possível carregar o modelo 3D.
    </div>

    <model-viewer
        id="viewer"
        alt="Visualização 3D do produto"
        camera-controls
        auto-rotate
        auto-rotate-delay="0"
        rotation-per-second="15deg"
        shadow-intensity="1"
        shadow-softness="1"
        environment-image="neutral"
        exposure="1"
        interaction-prompt="none"
        loading="eager"
        reveal="auto"
        disable-pan>
    </model-viewer>

    <script>
        (() => {
            "use strict";

            const params = new URLSearchParams(window.location.search);

            const model = params.get("model");
            const poster = params.get("poster");
            const alt = params.get("alt");

            const viewer = document.getElementById("viewer");
            const posterLayer = document.getElementById("posterLayer");
            const posterImg = document.getElementById("posterImg");
            const progressWrap = document.getElementById("progressWrap");
            const progressBar = document.getElementById("progressBar");
            const progressTexto = document.getElementById("progressTexto");
            const erro = document.getElementById("erro");
            const fechar = document.getElementById("fechar");

            const parentOrigin = "https://pichaugaming.com.br";
            const fallbackUrl = "https://pichaugaming.com.br";

            let carregado = false;
            let timeoutCarregamento = null;

            function modeloValido(nome) {
                if (!nome) {
                    return false;
                }

                const arquivo = nome.trim();

                if (!arquivo) {
                    return false;
                }

                if (!arquivo.toLowerCase().endsWith(".glb")) {
                    return false;
                }

                if (
                    arquivo.includes("..") ||
                    arquivo.includes("/") ||
                    arquivo.includes("\\") ||
                    arquivo.includes("\0")
                ) {
                    return false;
                }

                return true;
            }

            function avisarParent(action) {
                if (window.parent === window) {
                    return;
                }

                window.parent.postMessage(
                    {
                        type: "viewer3d",
                        action: action
                    },
                    parentOrigin
                );
            }

            function esconderPoster() {
                posterLayer.classList.add("oculto");

                window.setTimeout(() => {
                    posterLayer.style.display = "none";
                }, 350);
            }

            function mostrarErro(mensagem) {
                if (timeoutCarregamento) {
                    window.clearTimeout(timeoutCarregamento);
                    timeoutCarregamento = null;
                }

                posterLayer.style.display = "none";
                viewer.style.display = "none";

                erro.textContent =
                    mensagem || "Não foi possível carregar o modelo 3D.";

                erro.classList.add("visivel");
            }

            function aplicarPoster() {
                if (!poster) {
                    return;
                }

                try {
                    const posterUrl = new URL(
                        poster,
                        window.location.href
                    );

                    if (
                        posterUrl.protocol === "https:" ||
                        posterUrl.protocol === "http:"
                    ) {
                        posterImg.src = posterUrl.href;
                    }
                } catch (error) {
                    console.warn("URL do poster inválida:", error);
                }
            }

            function aplicarAlt() {
                if (!alt || !alt.trim()) {
                    return;
                }

                const textoAlt = alt.trim();

                viewer.setAttribute("alt", textoAlt);
                posterImg.setAttribute("alt", textoAlt);
            }

            function atualizarProgresso(fracao) {
                const percentual = Math.max(
                    0,
                    Math.min(100, Math.round(fracao * 100))
                );

                progressBar.style.width = percentual + "%";
                progressTexto.textContent =
                    "Carregando modelo 3D... " + percentual + "%";
                progressWrap.setAttribute("aria-valuenow", String(percentual));
            }

            async function arquivoExiste(url) {
                try {
                    const resposta = await fetch(url, {
                        method: "HEAD",
                        cache: "no-store"
                    });

                    return resposta.ok;
                } catch (error) {
                    console.warn(
                        "Não foi possível verificar o arquivo antes do carregamento:",
                        error
                    );

                    /*
                     * Alguns servidores ou navegadores podem bloquear HEAD.
                     * Nesse caso, deixamos o model-viewer tentar carregar.
                     */
                    return true;
                }
            }

            async function carregarModelo() {
                if (!modeloValido(model)) {
                    mostrarErro("Modelo 3D não encontrado.");
                    return;
                }

                const nomeArquivo = model.trim();

                /*
                 * Não usar encodeURIComponent aqui.
                 * URLSearchParams já entrega o valor decodificado e o
                 * construtor URL monta corretamente o caminho.
                 */
                const glbUrl = new URL(
                    "./" + nomeArquivo,
                    window.location.href
                );

                console.log("URL do modelo:", glbUrl.href);

                const existe = await arquivoExiste(glbUrl.href);

                if (!existe) {
                    console.error(
                        "O arquivo GLB não foi encontrado:",
                        glbUrl.href
                    );

                    mostrarErro("Modelo 3D não encontrado.");
                    return;
                }

                viewer.setAttribute("src", glbUrl.href);

                timeoutCarregamento = window.setTimeout(() => {
                    if (!carregado) {
                        mostrarErro(
                            "O modelo 3D demorou muito para carregar."
                        );
                    }
                }, 180000);
            }

            viewer.addEventListener("load", () => {
                carregado = true;

                if (timeoutCarregamento) {
                    window.clearTimeout(timeoutCarregamento);
                    timeoutCarregamento = null;
                }

                atualizarProgresso(1);
                esconderPoster();

                console.log("Modelo 3D carregado com sucesso.");
            });

            viewer.addEventListener("error", event => {
                console.error(
                    "Erro do model-viewer ao carregar o GLB:",
                    event
                );

                mostrarErro(
                    "Não foi possível carregar o modelo 3D."
                );
            });

            viewer.addEventListener("progress", event => {
                const progresso = event.detail?.totalProgress;

                if (typeof progresso === "number") {
                    atualizarProgresso(progresso);
                }
            });

            posterImg.addEventListener("error", () => {
                console.warn(
                    "Não foi possível carregar a imagem de abertura."
                );

                posterImg.style.display = "none";
            });

            fechar.addEventListener("click", () => {
                if (window.parent !== window) {
                    avisarParent("close");
                    return;
                }

                if (window.history.length > 1) {
                    window.history.back();
                    return;
                }

                window.location.href = fallbackUrl;
            });

            avisarParent("open");
            aplicarPoster();
            aplicarAlt();

            if (!("customElements" in window)) {
                mostrarErro(
                    "Este navegador não possui suporte ao visualizador 3D."
                );

                return;
            }

            customElements
                .whenDefined("model-viewer")
                .then(carregarModelo)
                .catch(error => {
                    console.error(
                        "Não foi possível iniciar o model-viewer:",
                        error
                    );

                    mostrarErro(
                        "Não foi possível iniciar o visualizador 3D."
                    );
                });
        })();
    </script>

</body>
</html>
