<!DOCTYPE html>
<html lang="pt-BR">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Visualizador 3D</title>

<script type="module" src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js"></script>

<style>

html,
body{
    margin:0;
    width:100%;
    height:100%;
    overflow:hidden;
    background:#191919;
    font-family:Poppins,Arial,sans-serif;
}

model-viewer{
    width:100vw;
    height:100vh;
    background:#191919;
    --poster-color:#191919;
}

#fechar{

    position:fixed;
    top:20px;
    right:20px;

    z-index:999999;

    background:#D43043;
    color:#fff;

    border:none;
    border-radius:6px;

    padding:10px 18px;

    cursor:pointer;

    font-size:14px;
    font-weight:600;

    transition:.25s;

}

#fechar:hover{

    background:#AA091C;

}

#erro{

    display:none;

    position:fixed;

    inset:0;

    justify-content:center;
    align-items:center;

    color:#fff;

    background:#191919;

    font-size:18px;

    text-align:center;

    padding:30px;

}

</style>

</head>

<body>

<button id="fechar">Fechar</button>

<div id="erro">

Modelo 3D não encontrado.

</div>

<model-viewer

id="viewer"

poster="https://drivers.pichau.com.br/pichaugaming/Banner/Design-Lab-White.png"

camera-controls

auto-rotate

rotation-per-second="15deg"

shadow-intensity="1"

environment-image="neutral"

exposure="1"

interaction-prompt="none"

loading="eager"

reveal="auto">

</model-viewer>

<script>

const params = new URLSearchParams(window.location.search);

const model = params.get("model");

const viewer = document.getElementById("viewer");

const erro = document.getElementById("erro");

if(!model){

    viewer.style.display="none";

    erro.style.display="flex";

}else{

    viewer.src="./"+model;

}

viewer.addEventListener("load",()=>{

    viewer.dismissPoster();

});

viewer.addEventListener("error",()=>{

    viewer.style.display="none";

    erro.style.display="flex";

});

document.getElementById("fechar").addEventListener("click",()=>{

    if(window.parent!==window){

        window.parent.postMessage({

            type:"viewer3d",

            action:"close"

        },"*");

    }else{

        history.back();

    }

});

</script>

</body>

</html>
